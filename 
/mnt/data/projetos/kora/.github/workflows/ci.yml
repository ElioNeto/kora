name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.20'

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.txt

      - name: Lint
        run: go vet ./...
