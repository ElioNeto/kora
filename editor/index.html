<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kora Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <svg class="logo" viewBox="0 0 32 32" fill="none" aria-label="Kora">
      <polygon points="6,26 16,6 26,26" stroke="#00e5a0" stroke-width="2.5" fill="none"/>
      <line x1="10" y1="20" x2="22" y2="20" stroke="#00e5a0" stroke-width="2"/>
    </svg>
    <span class="logo-text">Kora <span class="logo-sub">Editor</span></span>
  </div>
  <div class="topbar-center">
    <button class="tb-btn active" data-tab="scene">Cena</button>
    <button class="tb-btn" data-tab="preview">&#9654; Preview</button>
    <button class="tb-btn" data-tab="assets">Assets</button>
    <button class="tb-btn" data-tab="code">Script</button>
  </div>
  <div class="topbar-right">
    <button class="tb-btn" id="btn-new"       title="Nova cena (Ctrl+N)">&#43; Nova</button>
    <button class="tb-btn" id="btn-open"      title="Abrir cena (Ctrl+O)">&#128194; Abrir</button>
    <button class="tb-btn" id="btn-save"      title="Salvar JSON (Ctrl+S)">&#128190; Salvar</button>
    <button class="tb-btn" id="btn-export-ks" title="Exportar KScript">&#128196; .ks</button>
    <div class="vp-sep" style="margin:0 4px"></div>
    <button class="tb-btn" id="btn-play"   title="Rodar no preview (F5)">&#9654; Rodar</button>
    <button class="tb-btn" id="btn-export" title="Exportar APK">&#11015; APK</button>
    <button class="tb-icon" data-theme-toggle aria-label="Alternar tema">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="workspace">

  <aside class="panel panel-hierarchy">
    <div class="panel-header">
      <span>Hierarquia</span>
      <button class="icon-btn" id="btn-add-entity" title="Adicionar entidade">+</button>
    </div>
    <ul class="hierarchy-list" id="hierarchy-list"></ul>
  </aside>

  <main class="viewport" id="main-content">

    <!-- SCENE -->
    <div id="tab-scene" class="tab-pane active">
      <div class="viewport-toolbar">
        <button class="vp-tool active" data-tool="select">&#9654;</button>
        <button class="vp-tool" data-tool="move">&#10021;</button>
        <button class="vp-tool" data-tool="scale">&#10529;</button>
        <div class="vp-sep"></div>
        <span class="vp-info" id="vp-coords">x: 0  y: 0</span>
        <span class="vp-info" id="vp-zoom">100%</span>
        <button class="vp-tool" id="btn-zoom-fit">&#8862;</button>
      </div>
      <canvas id="scene-canvas"></canvas>
    </div>

    <!-- PREVIEW -->
    <div id="tab-preview" class="tab-pane" style="display:none">
      <div id="preview-container" class="preview-container"></div>
    </div>

    <!-- ASSETS -->
    <div id="tab-assets" class="tab-pane" style="display:none">
      <div id="assets-container" class="assets-panel"></div>
    </div>

    <!-- CODE (placeholder) -->
    <div id="tab-code" class="tab-pane" style="display:none">
      <div style="padding:24px;color:var(--color-text-muted);font-size:13px">Editor KScript — em breve (#5)</div>
    </div>

  </main>

  <aside class="panel panel-inspector" id="inspector">
    <div class="panel-header">
      <span id="inspector-title">Inspetor</span>
    </div>
    <div class="inspector-body" id="inspector-body">
      <p class="inspector-empty">Selecione uma entidade</p>
    </div>
  </aside>

</div>

<footer class="console" id="console">
  <div class="console-header">
    <span>Console</span>
    <button class="icon-btn" id="btn-clear-console">Limpar</button>
  </div>
  <div class="console-body" id="console-body"></div>
</footer>

<div class="modal-backdrop" id="modal-backdrop" hidden>
  <div class="modal">
    <div class="modal-header">
      <span>Adicionar entidade</span>
      <button class="icon-btn modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <label>Nome<input type="text" id="new-entity-name" placeholder="Player" autocomplete="off"></label>
      <label>Tipo
        <select id="new-entity-type">
          <option value="sprite">Sprite</option>
          <option value="tilemap">Tilemap</option>
          <option value="camera">Camera</option>
          <option value="audio">AudioEmitter</option>
          <option value="custom">Custom</option>
        </select>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary modal-close">Cancelar</button>
      <button class="btn-primary" id="confirm-add-entity">Adicionar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="serializer.js"></script>
<script src="preview-panel.js"></script>
<script src="idb.js"></script>
<script src="assets-panel.js"></script>
<script src="editor.js"></script>
</body>
</html>
