<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kora Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0f1117; overflow: hidden; }
canvas { display: block; image-rendering: pixelated; }
#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(15,17,23,0.82);
  color: #7d8590; font: 13px 'Inter', sans-serif;
  gap: 8px; pointer-events: none;
}
#overlay.hidden { display: none; }
#overlay .icon { font-size: 32px; }
#hud {
  position: fixed; top: 8px; left: 8px;
  font: 11px 'JetBrains Mono', monospace;
  color: #00e5a0; pointer-events: none;
  line-height: 1.8;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="overlay">
  <div class="icon">&#9654;</div>
  <div>Aguardando cena...</div>
</div>

<script>
'use strict';

// ───────────────────────────────────────────────────────────
// Mini physics (mirrors core/physics in JS for preview)
// ───────────────────────────────────────────────────────────
const GRAVITY = 980;
const TERMINAL = 1200;

function stepPhysics(bodies, dt) {
  for (const b of bodies) {
    if (b.bodyType === 'static') continue;
    if (b.bodyType === 'dynamic') {
      b.velY += GRAVITY * dt;
      if (b.velY > TERMINAL) b.velY = TERMINAL;
    }
    b.x += b.velX * dt;
    b.y += b.velY * dt;
  }
  // Body-body AABB
  for (let i = 0; i < bodies.length; i++) {
    const a = bodies[i];
    if (a.bodyType === 'static') continue;
    for (let j = i + 1; j < bodies.length; j++) {
      const b = bodies[j];
      resolveAABB(a, b);
    }
  }
}

function resolveAABB(a, b) {
  const aL = a.x - a.w/2, aR = a.x + a.w/2, aT = a.y - a.h/2, aB = a.y + a.h/2;
  const bL = b.x - b.w/2, bR = b.x + b.w/2, bT = b.y - b.h/2, bB = b.y + b.h/2;
  if (aR <= bL || aL >= bR || aB <= bT || aT >= bB) return;

  const ox = Math.min(aR - bL, bR - aL);
  const oy = Math.min(aB - bT, bB - aT);

  if (b.bodyType === 'static') {
    if (ox < oy) {
      const nx = a.x < b.x ? -1 : 1;
      a.x += nx * ox;
      a.velX = 0;
      if (nx < 0) a.touchLeft = true; else a.touchRight = true;
    } else {
      const ny = a.y < b.y ? -1 : 1;
      a.y += ny * oy;
      if (ny < 0) { a.velY = 0; a.touchTop = true; }
      else { a.velY = 0; a.grounded = true; }
    }
  }
}

// ───────────────────────────────────────────────────────────
// Input
// ───────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// Touch / swipe
let touchStartX = 0, touchStartY = 0;
const touch = { left: false, right: false, jump: false };
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  touch.left  = dx < -20;
  touch.right = dx > 20;
  touch.jump  = dy < -30;
}, { passive: true });
document.addEventListener('touchend', () => {
  touch.left = touch.right = touch.jump = false;
}, { passive: true });

// ───────────────────────────────────────────────────────────
// Canvas / viewport
// ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let LW = 360, LH = 640;

function resizeCanvas() {
  const ww = window.innerWidth, wh = window.innerHeight;
  const scale = Math.min(ww / LW, wh / LH);
  canvas.width  = LW;
  canvas.height = LH;
  canvas.style.width  = (LW * scale) + 'px';
  canvas.style.height = (LH * scale) + 'px';
  canvas.style.position = 'absolute';
  canvas.style.left = ((ww - LW * scale) / 2) + 'px';
  canvas.style.top  = ((wh - LH * scale) / 2) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ───────────────────────────────────────────────────────────
// Scene state
// ───────────────────────────────────────────────────────────
let bodies   = [];
let entities = [];
let running  = false;
let lastTs   = 0;
let frameCount = 0;
let fps = 0;
let fpsTs = 0;

const ENTITY_ICONS = { sprite: '🟦', tilemap: '🔲', camera: '📷', audio: '🔊', custom: '⬡' };

function loadScene(doc) {
  LW = doc.logicalW || 360;
  LH = doc.logicalH || 640;
  resizeCanvas();

  entities = (doc.entities || []).map(e => ({ ...e }));
  bodies = [];

  for (const e of entities) {
    const btype = e.type === 'tilemap' ? 'static' : 'dynamic';
    const b = {
      entityId: e.id,
      x: e.x, y: e.y,
      w: e.w || 48, h: e.h || 48,
      velX: 0, velY: 0,
      grounded: false, touchLeft: false, touchRight: false, touchTop: false,
      bodyType: btype,
    };
    bodies.push(b);
  }

  running = true;
  document.getElementById('overlay').classList.add('hidden');
}

function bodyFor(id) {
  return bodies.find(b => b.entityId === id);
}

// ───────────────────────────────────────────────────────────
// Render
// ───────────────────────────────────────────────────────────
const TYPE_COLORS = {
  sprite: '#00e5a0',
  tilemap: '#388bfd',
  camera: '#e3b341',
  audio: '#bc8cff',
  custom: '#ff7b72',
};

function render() {
  ctx.clearRect(0, 0, LW, LH);

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, LH);
  grad.addColorStop(0, '#0d1117');
  grad.addColorStop(1, '#161b22');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, LW, LH);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < LW; x += 32) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, LH); ctx.stroke(); }
  for (let y = 0; y < LH; y += 32) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(LW, y); ctx.stroke(); }

  for (const e of entities) {
    if (!e.visible) continue;
    const b = bodyFor(e.id);
    const ex = b ? b.x : e.x;
    const ey = b ? b.y : e.y;
    const ew = e.w || 48, eh = e.h || 48;

    ctx.save();
    ctx.translate(ex + LW/2, ey + LH/2);
    ctx.rotate((e.rotation || 0) * Math.PI / 180);

    // Fill
    const col = e.color || TYPE_COLORS[e.type] || '#00e5a0';
    ctx.fillStyle = col + 'bb';
    ctx.fillRect(-ew/2, -eh/2, ew, eh);

    // Border
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-ew/2, -eh/2, ew, eh);

    // Label
    ctx.fillStyle = '#e6edf3';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(e.name, 0, -eh/2 - 4);

    ctx.restore();
  }

  // HUD
  const player = entities.find(e => e.type === 'sprite');
  const pb = player ? bodyFor(player.id) : null;
  const hud = document.getElementById('hud');
  hud.innerHTML = [
    `FPS: ${fps}`,
    pb ? `pos: ${Math.round(pb.x)}, ${Math.round(pb.y)}` : '',
    pb ? `vel: ${Math.round(pb.velX)}, ${Math.round(pb.velY)}` : '',
    pb ? `grounded: ${pb.grounded}` : '',
  ].filter(Boolean).join('<br>');
}

// ───────────────────────────────────────────────────────────
// Player controller (applied to first sprite entity)
// ───────────────────────────────────────────────────────────
const SPEED  = 180;
const JUMP_V = -520;

function applyPlayerInput(dt) {
  const player = entities.find(e => e.type === 'sprite');
  if (!player) return;
  const b = bodyFor(player.id);
  if (!b) return;

  b.touchLeft = b.touchRight = b.touchTop = false;

  const left  = keys['ArrowLeft']  || keys['KeyA'] || touch.left;
  const right = keys['ArrowRight'] || keys['KeyD'] || touch.right;
  const jump  = keys['ArrowUp']    || keys['KeyW'] || keys['Space'] || touch.jump;

  b.velX = 0;
  if (left)  b.velX = -SPEED;
  if (right) b.velX =  SPEED;
  if (jump && b.grounded) {
    b.velY = JUMP_V;
    b.grounded = false;
  }
}

// ───────────────────────────────────────────────────────────
// Game loop
// ───────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (!running) return;

  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  frameCount++;

  if (ts - fpsTs >= 1000) {
    fps = frameCount;
    frameCount = 0;
    fpsTs = ts;
  }

  // Reset per-frame flags
  for (const b of bodies) { b.grounded = false; b.touchLeft = b.touchRight = b.touchTop = false; }

  applyPlayerInput(dt);
  stepPhysics(bodies, dt);
  render();
}
requestAnimationFrame(ts => { lastTs = ts; fpsTs = ts; requestAnimationFrame(loop); });

// ───────────────────────────────────────────────────────────
// PostMessage API (receives scene from editor)
// ───────────────────────────────────────────────────────────
window.addEventListener('message', ev => {
  const msg = ev.data;
  if (!msg || typeof msg !== 'object') return;

  switch (msg.type) {
    case 'KORA_LOAD_SCENE':
      loadScene(msg.scene);
      break;
    case 'KORA_STOP':
      running = false;
      document.getElementById('overlay').classList.remove('hidden');
      break;
    case 'KORA_RESUME':
      if (entities.length) {
        running = true;
        document.getElementById('overlay').classList.add('hidden');
      }
      break;
  }
});
</script>
</body>
</html>
